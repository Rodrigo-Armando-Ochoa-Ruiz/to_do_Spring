<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Task List</title>
</head>
<body>

<h1>Task List</h1>

<a href="/task_manager/task/create">Create New Task</a>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Description</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="task : ${tasks}">
    <td th:text="${task.id}"></td>
    <td th:text="${task.description}"></td>
    <td th:text="${task.status}"></td>
    <td>
      <a th:href="@{/task/{id}(id=${task.id})}">View</a>
      <a th:href="@{/task/edit/{id}(id=${task.id})}">Edit</a>
      <a th:href="@{/task/delete/{id}(id=${task.id})}">Delete</a>
    </td>
  </tr>
  </tbody>

  <div>
    <a th:href="@{/task(page=${currentPage - 1})}"
       th:if="${currentPage > 0}">
      Anterior
    </a>

    <span>Página [[${currentPage}]]</span>

    <a th:href="@{/task(page=${currentPage + 1})}">
      Siguiente
    </a>
  </div>
</table>

</body>
</html>
